name: Build &amp; Release

# Triggers:
#   push to main          → build and publish to a rolling "main" prerelease
#   push of v* tag        → build and publish a numbered GitHub Release
#   pull_request          → build only (no release)
#   workflow_dispatch     → manual run

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $base = (Get-Content carpeteater/__init__.py | `
                   Select-String '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $public = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $sha    = $env:GITHUB_SHA.Substring(0, 7)
            $public = "$base-dev+$sha"
          }
          "public=$public" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Public version: $public"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Cache ffmpeg
        uses: actions/cache@v4
        with:
          path: vendor/ffmpeg.exe
          key: ffmpeg-essentials-windows-v1

      - name: Build everything
        shell: pwsh
        run: python build.py

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $public = "${{ steps.version.outputs.public }}"
          New-Item -ItemType Directory -Force release | Out-Null
          # Versioned copies (permanent links per release).
          Copy-Item installer\Output\CarpetEater-Setup.exe   "release\CarpetEater-Setup-$public.exe"
          Copy-Item release\CarpetEater-Portable.zip          "release\CarpetEater-Portable-$public.zip"
          # Unversioned copies (overwriting `latest` links).
          Copy-Item installer\Output\CarpetEater-Setup.exe    release\CarpetEater-Setup.exe -Force
          Get-ChildItem release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CarpetEater-${{ steps.version.outputs.public }}
          path: release/
          retention-days: 30

      # ----------------------------------------------------- rolling main release
      # Only the unversioned filenames are published to the rolling release —
      # those are the ones users link to, and they get overwritten each push.
      - name: Publish rolling main prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: "Rolling main build"
          prerelease: true
          make_latest: 'false'
          body: |
            Auto-built from the latest commit on `main`.

            Version: `${{ steps.version.outputs.public }}`
            Commit: ${{ github.sha }}

            **For end users:** prefer the [latest stable release](https://github.com/${{ github.repository }}/releases/latest).
          files: |
            release/CarpetEater-Setup.exe
            release/CarpetEater-Portable.zip

      # -------------------------------------------------- numbered tagged release
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Carpet Eater ${{ github.ref_name }}"
          generate_release_notes: true
          make_latest: 'true'
          files: |
            release/CarpetEater-Setup.exe
            release/CarpetEater-Portable.zip
            release/CarpetEater-Setup-${{ steps.version.outputs.public }}.exe
            release/CarpetEater-Portable-${{ steps.version.outputs.public }}.zip
